# Runs unit and integration tests for the DataJoint pipeline.
# Unit tests use mocked datajoint — no database required.
# Integration tests use testcontainers MySQL — no golden datasets required.
# Tests requiring golden datasets (test_full_ingestion.py) skip automatically in CI.

name: test_dj_pipeline
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv and set Python version  
        uses: astral-sh/setup-uv@v7  
        with:  
          python-version: ${{ matrix.python-version }}  

      - name: Install dependencies
        run: uv sync --group test

      - name: Run unit tests
        run: uv run pytest -m unit --tb=short -q

  integration-tests:
    name: Integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv and set Python version  
        uses: astral-sh/setup-uv@v7  
        with:  
          python-version: ${{ matrix.python-version }}  

      - name: Install dependencies
        run: uv sync --group test

      - name: Run integration tests
        run: uv run pytest -m integration --tb=short -q
