# This workflow runs on PRs and pushes to `main` and `datajoint_pipeline`.
# It does the following:
# - lints (ruff, pyright)
# - runs all tests on ubuntu (unit + integration), unit tests only on windows
# - reports coverage via codecov (ubuntu only)

name: build_env_run_tests
on:
  push:
    branches: [main, datajoint_pipeline]
  pull_request:
    branches: [main, datajoint_pipeline]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: ruff
        run: uv run ruff check .
      - name: pyright
        run: uv run pyright --level error --project ./pyproject.toml .

  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pytest_args: "--tb=short -q --cov=aeon --cov-report=xml"
          - os: windows-latest
            pytest_args: "-m unit --tb=short -q"
          - os: macos-latest
            pytest_args: "-m unit --tb=short -q"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest ${{ matrix.pytest_args }}
      - name: Upload coverage to codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
